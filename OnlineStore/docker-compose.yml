version: '3.8'

services:
  presentationlayer:
    image: ${DOCKER_REGISTRY-}presentationlayer
    build:
      context: .
      dockerfile: PresentationLayer/Dockerfile
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=db;Port=5432;Database=mydb;Username=user;Password=password
    depends_on:
      - db
    restart: on-failure

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydb
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  db-data: